<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra Superior Isopan Ibérica</title>
    <style>
        :root {
            --isopan-blue: #2a6f8f;
            --text-white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: transparent !important;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #wrapper { padding: 30px 40px; box-sizing: border-box; width: 100%; }

        /* BARRA OPTIMIZADA PARA TV (YODECK) */
        #header-bar {
            width: 100%; height: 125px;
            /* Gradiente simplificado a 200% para fluidez total */
            background: linear-gradient(270deg, #2a6f8f, #357c9e, #215d79);
            background-size: 200% 200%;
            animation: gradientBG 15s linear infinite; /* Movimiento lineal sin tirones */
            
            border-radius: 40px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 60px; box-sizing: border-box; color: var(--text-white);
            
            /* ACELERACIÓN POR HARDWARE (Clave para TVs) */
            transform: translate3d(0,0,0);
            will-change: background-position;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- IZQUIERDA: TIEMPO --- */
        .weather-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 220px;
        }

        .weather-content {
            display: flex; align-items: center; gap: 18px;
        }

        .weather-icon-box { 
            width: 70px; height: 70px; 
            display: flex; align-items: center; justify-content: center; 
        }

        .weather-svg { 
            width: 100%; height: 100%; fill: white; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); 
        }

        .temp-main { 
            font-size: 60px; font-weight: 800; 
            letter-spacing: -2px; line-height: 1; 
        }

        .city-label { 
            font-size: 11px; font-weight: 800; opacity: 0.6; 
            letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; 
        }

        /* --- CENTRO: LOGO --- */
        .center-logo-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .center-logo-area img {
            max-height: 85px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* --- DERECHA: HORA Y FECHA --- */
        .datetime-section { 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-width: 200px; 
        }

        #clock { 
            font-size: 64px; font-weight: 700; 
            line-height: 0.9; letter-spacing: -2px; 
        }

        #date { 
            font-size: 18px; font-weight: 700; opacity: 0.7; 
            margin-top: 5px; letter-spacing: 0.5px; 
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <div id="header-bar">
            
            <div class="weather-section">
                <div class="weather-content">
                    <div class="weather-icon-box" id="weather-icon-container"></div>
                    <div class="temp-main" id="temp">--°</div>
                </div>
                <div class="city-label">ISOPAN IBÉRICA</div>
            </div>

            <div class="center-logo-area">
                <img src="logo.png" alt="Logo Isopan">
            </div>

            <div class="datetime-section">
                <span id="clock">00:00</span>
                <span id="date">--/--/----</span>
            </div>

        </div>
    </div>

    <script>
        // ACTUALIZACIÓN DE HORA
        function updateUI() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
            
            const day = now.getDate().toString().padStart(2, '0');
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('date').innerText = `${day}/${month}/${year}`;
        }

        // CLIMA REAL (Open-Meteo)
        async function getRealWeather() {
            try {
                // Coordenadas Isopan Ibérica, Constantí
                const lat = 41.165;
                const lon = 1.173;
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                document.getElementById('temp').innerText = temp + "°";
                updateWeatherIcon(code);
            } catch (error) {
                document.getElementById('temp').innerText = "21°";
                updateWeatherIcon(0); 
            }
        }

        function updateWeatherIcon(code) {
            const container = document.getElementById('weather-icon-container');
            let iconSvg = '';

            // Iconos geométricos estables
            if (code <= 2) { // Despejado
                iconSvg = `<svg class="weather-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;
            } else if (code <= 48) { // Nublado
                iconSvg = `<svg class="weather-svg" viewBox="0 0 24 24"><circle cx="7" cy="16" r="4"/><circle cx="11" cy="13" r="5"/><circle cx="16" cy="16" r="4"/><rect x="7" y="16" width="9" height="4"/></svg>`;
            } else { // Lluvia
                iconSvg = `<svg class="weather-svg" viewBox="0 0 24 24"><path d="M7 16a4 4 0 0 1 0-8h.3a5 5 0 0 1 9.4 0h.3a4 4 0 0 1 0 8H7z"/><line x1="8" y1="18" x2="8" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="18" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="18" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;
            }
            container.innerHTML = iconSvg;
        }

        setInterval(updateUI, 1000);
        setInterval(getRealWeather, 1800000); 
        
        updateUI();
        getRealWeather();
    </script>
</body>
</html>
